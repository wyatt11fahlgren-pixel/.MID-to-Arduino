<!DOCTYPE html>
<html>
<head>
  <title>Arduino Music Studio - Fixed Engine</title>

  <script src="https://cdn.jsdelivr.net/npm/@tonejs/midi"></script>

  <style>
    body {
      margin: 0;
      background: #0f0f0f;
      font-family: Arial;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .app {
      width: 820px;
      background: #1c1c1c;
      padding: 20px;
      border-radius: 12px;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
    }

    select {
      background: #111;
      color: white;
    }

    button {
      background: #2d6cdf;
      color: white;
      cursor: pointer;
    }

    textarea {
      width: 100%;
      height: 260px;
      margin-top: 10px;
      background: #111;
      color: #0f0;
      font-size: 12px;
    }

    .file {
      color: #00ff99;
      font-size: 13px;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<div class="app">

  <h1>🎵 Arduino Music Studio (Fixed Synth Engine)</h1>

  <input type="file" id="file" accept=".mid,.midi">
  <div class="file" id="fileName">No file loaded</div>

  <div class="row">
    <select id="buzzers">
      <option value="2" selected>2 buzzers</option>
      <option value="4">4 buzzers</option>
      <option value="8">8 buzzers</option>
    </select>

    <select id="mode">
      <option value="lowhigh">Lowest → Highest</option>
      <option value="bassmelody">Bass + Melody</option>
    </select>
  </div>

  <button id="generate">Generate Arduino Code</button>

  <textarea id="output"></textarea>

</div>

<script>

const fileInput = document.getElementById("file");
const fileName = document.getElementById("fileName");
const output = document.getElementById("output");

let midiData = null;
let mappedFrames = [];

fileInput.addEventListener("change", async () => {
  const file = fileInput.files[0];
  if (!file) return;

  fileName.textContent = "Loaded: " + file.name;

  const buffer = await file.arrayBuffer();
  midiData = new Midi(buffer);
});

function midiToFreq(m) {
  return 440 * Math.pow(2, (m - 69) / 12);
}

document.getElementById("generate").addEventListener("click", () => {

  if (!midiData) return;

  const buzzers = parseInt(document.getElementById("buzzers").value);
  const mode = document.getElementById("mode").value;

  let notes = [];

  midiData.tracks.forEach(t => {
    t.notes.forEach(n => {
      notes.push({ midi: n.midi, time: n.time });
    });
  });

  notes.sort((a,b)=>a.time-b.time);

  // build frames
  const STEP = 0.05;
  let frames = [];

  notes.forEach(n => {
    let f = frames.find(x => Math.abs(x.time - n.time) < STEP);
    if (!f) {
      f = { time: n.time, notes: [] };
      frames.push(f);
    }
    f.notes.push(n.midi);
  });

  frames.sort((a,b)=>a.time-b.time);

  // voice allocation
  mappedFrames = frames.map(f => {

    let sorted = [...f.notes].sort((a,b)=>a-b);

    let out = [];

    if (mode === "bassmelody" && buzzers === 2) {
      out = [
        sorted[0] ?? -1,
        sorted[sorted.length - 1] ?? -1
      ];
    } else {
      for (let i = 0; i < buzzers; i++) {
        out[i] = sorted[i] !== undefined ? sorted[i] : -1;
      }
    }

    return {
      time: Math.floor(f.time * 1000),
      notes: out
    };
  });

  // generate Arduino code
  let code = `// --------------------------------
// Arduino Synth Engine. copy and paste this code into Arduino.IDE
// ________________________________

#define BUZZERS ${buzzers}

struct Frame {
  unsigned long time;
  int notes[${buzzers}];
};

Frame song[] = {
`;

  mappedFrames.forEach(f => {
    code += "  {" + f.time + ", {";

    for (let i = 0; i < buzzers; i++) {
      let note = f.notes[i];
      let freq = (note === -1) ? -1 : Math.round(midiToFreq(note));
      code += freq + (i < buzzers - 1 ? "," : "");
    }

    code += "}},\n";
  });

  code += `};

const int SONG_LEN = sizeof(song)/sizeof(song[0]);
int index = 0;

void setup() {
`;

  for (let i = 0; i < buzzers; i++) {
    code += `  pinMode(${i}, OUTPUT);\n`;
  }

  code += `
}

void loop() {

  unsigned long now = millis();

  if (index < SONG_LEN && now >= song[index].time) {

    for (int i = 0; i < BUZZERS; i++) {
      if (song[index].notes[i] > 0) {
        tone(i, song[index].notes[i]);
      } else {
        noTone(i);
      }
    }

    index++;
  }

  // End of song
  if (index >= SONG_LEN) {
    for (int i = 0; i < BUZZERS; i++) {
      noTone(i);
    }
    while (true);

    //   :)
  }
}
`;

  output.value = code;
});

</script>

</body>
</html>
